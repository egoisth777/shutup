name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install
        shell: bash
        run: if [ -f package-lock.json ]; then npm ci; else npm install; fi
      - run: node --test tests/
